<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hematology Triage Assessment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      color: #111827;
      margin-bottom: 8px;
    }

    .header p {
      color: #6b7280;
      font-size: 16px;
    }

    .symptoms-list {
      display: grid;
      gap: 12px;
      margin-bottom: 30px;
    }

    .symptom-item {
      display: flex;
      align-items: flex-start;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .symptom-item:hover {
      border-color: #667eea;
      background: #f9fafb;
    }

    .symptom-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .symptom-item label {
      cursor: pointer;
      flex: 1;
    }

    .symptom-item label strong {
      display: block;
      color: #111827;
      margin-bottom: 4px;
    }

    .symptom-item label span {
      color: #6b7280;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .result {
      padding: 24px;
      border-radius: 8px;
      margin-top: 30px;
      display: none;
    }

    .result.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-level {
      font-size: 48px;
      text-align: center;
      margin-bottom: 16px;
    }

    .result-urgency {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .result-recommendation {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .result-reasoning {
      font-size: 14px;
      padding: 12px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.05);
      margin-bottom: 16px;
    }

    .result-selected {
      font-size: 14px;
      color: #6b7280;
      padding: 12px;
      background: #f9fafb;
      border-radius: 6px;
    }

    .result-red {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid #ef4444;
    }

    .result-yellow {
      background: #fef3c7;
      color: #92400e;
      border-left: 4px solid #f59e0b;
    }

    .result-green {
      background: #dcfce7;
      color: #166534;
      border-left: 4px solid #10b981;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .info-box {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 14px;
      color: #1e40af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏥 Hematology Triage</h1>
      <p>Patient Self-Assessment Tool</p>
    </div>

    <div class="info-box">
      ℹ️ This tool helps determine urgency level. Always consult with a healthcare provider for medical decisions.
    </div>

    <div class="symptoms-list" id="symptomsList">
      <div class="loading">Loading symptoms...</div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="submitBtn" onclick="submitTriage()">
        Get Triage Level
      </button>
      <button class="btn-secondary" id="resetBtn" onclick="resetForm()">
        Reset
      </button>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-level" id="resultIcon"></div>
      <div class="result-urgency" id="resultUrgency"></div>
      <div class="result-recommendation" id="resultRecommendation"></div>
      <div class="result-reasoning" id="resultReasoning"></div>
      <div class="result-selected">
        <strong>Symptoms Selected:</strong> <span id="selectedCount"></span>
      </div>
    </div>
  </div>

  <script>
    let symptoms = [];

    // Load symptoms on page load
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/symptoms');
        symptoms = await response.json();
        renderSymptoms();
      } catch (err) {
        showError('Failed to load symptoms. Please refresh the page.');
        console.error(err);
      }
    });

    function renderSymptoms() {
      const list = document.getElementById('symptomsList');
      list.innerHTML = symptoms.map(symptom => `
        <div class="symptom-item">
          <input type="checkbox" id="${symptom.id}" value="${symptom.id}" />
          <label for="${symptom.id}">
            <strong>${symptom.id.replace(/_/g, ' ').toUpperCase()}</strong>
            <span>${symptom.label}</span>
          </label>
        </div>
      `).join('');
    }

    async function submitTriage() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
      const selectedSymptoms = Array.from(checkboxes).map(cb => cb.value);

      document.getElementById('error').classList.remove('show');

      try {
        const response = await fetch('/api/triage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ symptoms: selectedSymptoms })
        });

        if (!response.ok) throw new Error('Triage request failed');

        const result = await response.json();
        displayResult(result, selectedSymptoms);
      } catch (err) {
        showError('Failed to calculate triage level. Please try again.');
        console.error(err);
      }
    }

    function displayResult(result, selected) {
      const resultDiv = document.getElementById('result');
      resultDiv.className = `result show result-${result.level.toLowerCase()}`;

      document.getElementById('resultIcon').textContent = result.icon;
      document.getElementById('resultUrgency').textContent = result.urgency;
      document.getElementById('resultRecommendation').textContent = result.recommendation;
      document.getElementById('resultReasoning').textContent = `Reasoning: ${result.reasoning || 'Assessment complete'}`;
      document.getElementById('selectedCount').textContent = `${selected.length} symptom${selected.length !== 1 ? 's' : ''} selected`;
    }

    function resetForm() {
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      document.getElementById('result').classList.remove('show');
      document.getElementById('error').classList.remove('show');
    }

    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
  </script>
</body>
</html>
